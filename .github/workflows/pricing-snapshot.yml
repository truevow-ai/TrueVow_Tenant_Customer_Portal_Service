name: Pricing Snapshot

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual refresh'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    name: Fetch pricing catalog from Billing Service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch pricing snapshot
        env:
          BILLING_SERVICE_URL: ${{ secrets.BILLING_SERVICE_URL }}
          BILLING_SERVICE_API_KEY: ${{ secrets.BILLING_SERVICE_API_KEY }}
          STALE_THRESHOLD_DAYS: ${{ vars.STALE_THRESHOLD_DAYS || '7' }}
        run: node scripts/fetch-pricing-snapshot.mjs

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet lib/pricing/pricing-snapshot.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No pricing changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Pricing catalog changed. Committing update."
          fi

      - name: Commit and push updated snapshot
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/pricing/pricing-snapshot.json
          VERSION=$(node -p "require('./lib/pricing/pricing-snapshot.json').snapshot_metadata.plan_version_id")
          DATE=$(node -p "new Date(require('./lib/pricing/pricing-snapshot.json').snapshot_metadata.snapshot_date).toISOString().slice(0,10)")
          git commit -m "chore(pricing): update snapshot to ${VERSION} (${DATE})"
          git push
